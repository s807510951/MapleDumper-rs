name: Release

# Cut a release by pushing an annotated tag like v0.4.0. The job builds the CLI with an embedded
# dependency list (cargo auditable) and the Tauri desktop app installer (NSIS), generates a CycloneDX
# SBOM, computes SHA-256 checksums, and publishes a GitHub release with everything attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install build and SBOM tooling
        run: |
          cargo install cargo-auditable --version 0.7.4 --locked
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo install tauri-cli --version "^2.0" --locked
      - name: Build the CLI with an embedded dependency list
        run: cargo auditable build --release -p maple-cli
      - name: Build the desktop app installer (Tauri NSIS)
        working-directory: crates/maple-app
        run: cargo tauri build --bundles nsis
      - name: Generate a CycloneDX SBOM
        run: cargo cyclonedx --format json
      - name: Assemble artifacts and checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/mapledumper.exe dist/mapledumper.exe
          # The Tauri NSIS installer (MapleDumper_<version>_x64-setup.exe).
          $setup = Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | Select-Object -First 1
          if ($setup) { Copy-Item $setup.FullName -Destination (Join-Path 'dist' $setup.Name) }
          else { throw 'desktop installer not found under target/release/bundle/nsis' }
          $sboms = @(Get-ChildItem -Recurse -Filter *.cdx.json | Where-Object FullName -NotLike '*\dist\*')
          foreach ($f in $sboms) { Copy-Item $f.FullName -Destination (Join-Path 'dist' $f.Name) }
          $sums = Get-FileHash dist/* -Algorithm SHA256 |
            ForEach-Object { '{0}  {1}' -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) }
          $sums | Out-File -Encoding ascii dist/SHA256SUMS.txt
      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $assets = Get-ChildItem dist -File | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME @assets `
            --title $env:GITHUB_REF_NAME `
            --notes "Automated release. ``mapledumper.exe`` is the CLI (built with cargo auditable; verify with: cargo audit bin mapledumper.exe). ``MapleDumper_<version>_x64-setup.exe`` is the desktop app installer (Tauri/NSIS; bundles the WebView2 bootstrapper). A CycloneDX SBOM per crate and SHA-256 checksums are attached."
