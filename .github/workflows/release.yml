name: Release

# Cut a release by pushing an annotated tag like v0.4.0. The job builds the CLI with an embedded
# dependency list (cargo auditable), generates a CycloneDX SBOM, computes SHA-256 checksums, and
# publishes a GitHub release with all three attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Install SBOM tooling
        run: |
          cargo install cargo-auditable --version 0.7.4 --locked
          cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Build the CLI with an embedded dependency list
        run: cargo auditable build --release -p maple-cli
      - name: Generate a CycloneDX SBOM
        run: cargo cyclonedx --format json
      - name: Assemble artifacts and checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/mapledumper.exe dist/mapledumper.exe
          $sboms = @(Get-ChildItem -Recurse -Filter *.cdx.json | Where-Object FullName -NotLike '*\dist\*')
          foreach ($f in $sboms) { Copy-Item $f.FullName -Destination (Join-Path 'dist' $f.Name) }
          $sums = Get-FileHash dist/* -Algorithm SHA256 |
            ForEach-Object { '{0}  {1}' -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) }
          $sums | Out-File -Encoding ascii dist/SHA256SUMS.txt
      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $assets = Get-ChildItem dist -File | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME @assets `
            --title $env:GITHUB_REF_NAME `
            --notes "Automated release. The CLI binary is built with cargo auditable (embedded dependency list); a CycloneDX SBOM and SHA-256 checksums are attached. Verify the dependency list with: cargo audit bin mapledumper.exe. The desktop app installer is not yet bundled here (tracked separately)."
