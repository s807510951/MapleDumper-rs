name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Components
        run: rustup component add clippy rustfmt
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Doctests
        run: cargo test --workspace --doc

  msrv:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install the declared minimum toolchain
        run: rustup toolchain install 1.95 --profile minimal
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Check against MSRV
        run: cargo +1.95 check --workspace

  win32:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Add the 32-bit target
        run: rustup target add i686-pc-windows-msvc
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Build and test the engine and CLI for 32-bit (the advertised x86 platform)
        run: cargo test -p maple-core -p maple-cli --target i686-pc-windows-msvc

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Frontend render test
        run: node crates/maple-app/frontend_test.cjs

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked
      - name: Check advisories, licenses, bans, and sources
        run: cargo deny check
